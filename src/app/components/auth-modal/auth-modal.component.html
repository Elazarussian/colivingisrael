<div class="modal-overlay" (click)="onBackdropClick($event)">
    <div class="modal-content">
        <button class="btn-close icon-only" (click)="closeModal()"></button>

        <h2>הרשמה / התחברות</h2>

        <div class="auth-tabs">
            <button class="tab-btn" [class.active]="activeTab === 'login'" (click)="switchTab('login')">התחברות</button>
            <button class="tab-btn" [class.active]="activeTab === 'signup'" (click)="switchTab('signup')">הרשמה</button>
        </div>

        <form id="auth-form" (ngSubmit)="onSubmit()">
            <input type="email" class="input-long form-control" [(ngModel)]="email" name="email" placeholder="אימייל"
                required />
            <input type="password" class="input-long form-control" [(ngModel)]="password" name="password"
                placeholder="סיסמה" [required]="activeTab === 'signup' || activeTab === 'login'" />
            <div *ngIf="activeTab === 'signup' && !password" style="color:#d32f2f;margin-bottom:0.5rem;font-size:0.9rem;">יש להזין סיסמה
                להרשמה</div>

            <!-- Role selection for signup -->
            <div *ngIf="activeTab === 'signup'" class="role-selector-container">
                <div class="role-label-title">אני מתעניין כ:</div>
                <div class="role-options-list">
                    <label class="role-option" [class.selected]="selectedRole === 'user'">
                        <input type="radio" name="role" [(ngModel)]="selectedRole" value="user" />
                        <span>אני מחפש דירה \ שותפים</span>
                    </label>
                    <label class="role-option" [class.selected]="selectedRole === 'maskir'">
                        <input type="radio" name="role" [(ngModel)]="selectedRole" value="maskir" />
                        <span>יש לי דירה להציע</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-approve" [disabled]="!email || !password || submitting">{{ activeTab
                === 'login' ? 'התחבר' : 'הירשם' }}</button>
            <div *ngIf="submitting" style="margin-top:0.5rem;color:var(--accent-blue);font-weight:600;">שולח...</div>
        </form>

        <div class="divider">
            <span>או</span>
        </div>

        <button id="google-signin" class="btn btn-special" (click)="onGoogleSignIn()">
            <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                <path fill="#EA4335"
                    d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                <path fill="#4285F4"
                    d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                <path fill="#FBBC05"
                    d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                <path fill="#34A853"
                    d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                <path fill="none" d="M0 0h48v48H0z" />
            </svg>
            התחבר עם Google
        </button>

        <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
    </div>
</div>
